  <script>
    const victoriaTimeEl = document.getElementById('victoria-time');

    const updateVictoriaTime = () => {
      victoriaTimeEl.textContent = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Vancouver',
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
      }).format(new Date());
    };

    updateVictoriaTime();
    setInterval(updateVictoriaTime, 1000);
  </script>
